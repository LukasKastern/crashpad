name: Build and Test
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        target: [
          native,
          x86_64-linux-gnu,
          x86_64-linux-musl,
          x86_64-windows-gnu,
          # aarch64-macos, not supported at the momoent
          aarch64-linux-gnu,
          aarch64-linux-musl
          # TODO: bsd
        ]
        optimize: [
          Debug,
          ReleaseSafe,
          ReleaseFast,
          ReleaseSmall
        ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=${{ matrix.optimize }}
